server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${AWS_DB_URL}:3306/readwith_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=true&requireSSL=true #jdbc:mysql://127.0.0.1:3306/readwith_db  #
    username: ${AWS_DB_USERNAME} #root #
    password: ${AWS_DB_PASSWORD} #12341234 #
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # t2.micro 환경 최적화: 커넥션 풀 크기 감축
      maximum-pool-size: 8 # 20 → 8 (메모리 절약)
      minimum-idle: 2 # 최소 유지 커넥션
      # 타임아웃 설정 최적화
      connection-timeout: 20000 # 30초 → 20초
      max-lifetime: 900000 # 30분 → 15분 (커넥션 재사용 주기 단축)
      keepalive-time: 300000 # 유휴 커넥션의 생존 여부를 확인하는 주기 (5분)
      idle-timeout: 300000 # 10분 → 5분 (유휴 커넥션 빠른 정리)
  sql:
    init:
      mode: never
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
  jpa:
    open-in-view: false # 요청 전/후로 EntityManager를 물고 있지 않도록
    properties:
      hibernate:
        show_sql: false
        format_sql: true
        use_sql_comments: true
        hbm2ddl:
          auto: validate
        default_batch_fetch_size: 1000
        # 배치 INSERT 최적화 (성능 개선)
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
            user-name-attribute: email
  # Spring AI - OpenAI 설정
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      image:
        options:
          model: dall-e-3
          size: 1024x1024
          quality: standard
          n: 1

epub:
  normalization:
    enabled: ${EPUB_NORMALIZATION_ENABLED:true}
    rule-version: ${EPUB_NORMALIZATION_RULE_VERSION:v2}
    locator-version: ${EPUB_NORMALIZATION_LOCATOR_VERSION:v2}

artifact:
  storage:
    public-prefix: ${ARTIFACT_PUBLIC_PREFIX:public}
    private-prefix: ${ARTIFACT_PRIVATE_PREFIX:private}
    cloud-front-base-url: ${CLOUDFRONT_BASE_URL:}
    private-url-ttl: ${ARTIFACT_PRIVATE_URL_TTL:1h}

locator:
  mode: ${LOCATOR_MODE:on}

api:
  contract:
    # v2로 완전히 대체된 manifest/progress/bookmark/graph/admin legacy 경로는 기본 차단한다.
    # books/favorites/pov-summaries 계열은 아직 일부 클라이언트 전환 확인 전이라 인터셉터에서 제외되어 있다.
    mode: ${API_CONTRACT_MODE:v2_only}

# JWT 설정
jwt:
  secret: ${JWT_SECRET:mySecretKey123456789012345678901234567890123456789012345678901234567890}
  access-token-expiration: 3600000 # 1시간 (밀리초)
  refresh-token-expiration: 604800000 # 7일 (밀리초)

# OAuth2 설정
app:
  oauth2:
    authorized-redirect-uris: ${OAUTH2_REDIRECT_URI:http://localhost:5173/auth/callback}
cloud:
  aws:
    s3:
      bucket: readwith-s3-bucket
    region:
      static: ap-northeast-2
    stack:
      auto: false
    credentials:
      accessKey: ${AWS_ACCESS_KEY_ID}
      secretKey: ${AWS_SECRET_ACCESS_KEY}
    path:
      original: original
      metadata: metadata

# 캐릭터 이미지 생성 설정
character-image:
  fallback-url: https://readwith-s3-bucket.s3.ap-northeast-2.amazonaws.com/character-images/default-character.jpg

  # 극강 통제 프롬프트 (얼굴만 나오도록)
  common-style: "CRITICAL: FACE PORTRAIT ONLY - NO OTHER ELEMENTS ALLOWED

    ═══ PRIMARY RULE (MOST IMPORTANT) ═══
    Draw ONLY the person's head and upper shoulders. NOTHING ELSE. NO decorative elements. NO patterns. NO symbols. NO ornaments. NO frames. NO borders. The subject's FACE is the ONLY focal point. The background must be COMPLETELY EMPTY except for plain paper texture.

    COMPOSITION (ENFORCE STRICTLY):
    - Square format 1:1 ratio
    - Show ONLY: top of head to upper shoulders (bust portrait)
    - Face occupies 65-70% of total image area
    - Head perfectly centered horizontally and vertically
    - Eye-level straight-on view, subject faces camera directly
    - ZERO rotation, ZERO tilt
    - Shoulders visible only at very bottom edge

    BACKGROUND (ABSOLUTE REQUIREMENT):
    - COMPLETELY PLAIN warm beige paper (#F5F1E8)
    - ONLY subtle paper grain texture visible
    - ZERO patterns, ZERO decorative elements
    - ZERO geometric shapes, ZERO borders, ZERO frames
    - ZERO symbols, ZERO ornaments, ZERO flourishes
    - If you see ANY pattern or decoration in background, REMOVE IT
    - Background fades to nothing at edges

    ART STYLE (CRITICAL):
    - 1950s-1960s vintage book illustration
    - Hand-drawn pen and ink technique
    - Clean black ink linework for facial features
    - Subtle cross-hatching ONLY for shadows on face
    - Soft sepia wash for skin tones
    - MUST look hand-drawn, NOT digital
    - NO digital painting effects

    COLOR PALETTE (STRICT):
    - Background: warm beige #F5F1E8 ONLY
    - Linework: sepia brown #704214
    - Shadows: lighter sepia tones
    - ONE subtle accent color on clothing ONLY (choose from: dusty blue #5B7C8D, forest green #4A5F4F, burgundy #6B3E3E, deep teal #3D5E5C)
    - NO bright colors, NO pure black, NO white highlights

    LIGHTING:
    - Soft diffused light from front-upper angle
    - Even illumination across entire face
    - NO dramatic shadows
    - NO high contrast
    - NO rim lighting
    - NO directional spots

    TEXTURE:
    - Visible paper grain throughout
    - Slight cross-hatch texture in skin
    - Matte finish appearance
    - NO glossy surfaces
    - NO digital smoothness
    - NO photographic effects

    ═══ ABSOLUTELY FORBIDDEN - NEVER INCLUDE ═══
    ❌ Decorative patterns in background
    ❌ Geometric shapes or borders
    ❌ Symbols, emblems, or ornaments
    ❌ Frames or edge decorations
    ❌ Text, letters, or labels
    ❌ Objects beside or behind subject
    ❌ Scenery or landscape elements
    ❌ Multiple subjects or people
    ❌ Body parts below shoulders
    ❌ Hands or arms
    ❌ Modern clothing or accessories
    ❌ Photorealistic rendering
    ❌ Digital painting effects
    ❌ HDR or enhanced contrast
    ❌ Lens blur or bokeh
    ❌ Vivid or neon colors
    ❌ 3D rendering appearance
    ❌ Busy or cluttered backgrounds

    REMEMBER: This is a SIMPLE HEAD PORTRAIT ONLY. The person's face is THE ONLY element. Everything else must be plain beige paper. If DALL-E tries to add ANY decoration, pattern, symbol, or ornament - REJECT and keep background COMPLETELY PLAIN."

  s3-path: character-images

  # OpenAI API Rate Limit 방지 설정
  delay-between-requests-ms: 2000 # 각 요청 사이 2초 대기
  batch-size: 10 # 10명씩 배치 처리
