server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/readwith_db  #jdbc:mysql://${AWS_DB_URL}:3306/readwith_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=true&requireSSL=true #
    username: root #${AWS_DB_USERNAME} #
    password: 12341234 #${AWS_DB_PASSWORD} #
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20 # 풀 크기 늘리기
  sql:
    init:
      mode: never
  jpa:
    open-in-view: false # 요청 전/후로 EntityManager를 물고 있지 않도록
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        show_sql: false
        format_sql: true
        use_sql_comments: true
        hbm2ddl:
          auto: update
        default_batch_fetch_size: 1000
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB