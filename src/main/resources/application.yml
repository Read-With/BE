server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${AWS_DB_URL}:3306/readwith_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=true&requireSSL=true #jdbc:mysql://127.0.0.1:3306/readwith_db  #
    username: ${AWS_DB_USERNAME} #root #
    password: ${AWS_DB_PASSWORD} #12341234 #
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20 # 풀 크기 늘리기
  sql:
    init:
      mode: never
  jpa:
    open-in-view: false # 요청 전/후로 EntityManager를 물고 있지 않도록
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        show_sql: false
        format_sql: true
        use_sql_comments: true
        hbm2ddl:
          auto: create
        default_batch_fetch_size: 1000
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
            user-name-attribute: email
  # Spring AI - OpenAI 설정
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      image:
        options:
          model: dall-e-3
          size: 1024x1024
          quality: standard
          n: 1

# JWT 설정
jwt:
  secret: ${JWT_SECRET:mySecretKey123456789012345678901234567890123456789012345678901234567890}
  access-token-expiration: 3600000 # 1시간 (밀리초)
  refresh-token-expiration: 604800000 # 7일 (밀리초)

# OAuth2 설정
app:
  oauth2:
    authorized-redirect-uris: ${OAUTH2_REDIRECT_URI:http://localhost:3000/auth/callback}
cloud:
  aws:
    s3:
      bucket: readwith-s3-bucket
    region:
      static: ap-northeast-2
    stack:
      auto: false
    credentials:
      accessKey: ${AWS_ACCESS_KEY_ID}
      secretKey: ${AWS_SECRET_ACCESS_KEY}
    path:
      original: original
      metadata: metadata

# 캐릭터 이미지 생성 설정
character-image:
  fallback-url: https://readwith-s3-bucket.s3.ap-northeast-2.amazonaws.com/character-images/default-character.jpg
  common-style: "Bust portrait, square composition, face centered occupying about 60–70% of the frame, eye-level perspective. Illustrative realism style — between realism and comic illustration. Clean ink linework with subtle cross-hatching, soft vintage brush shading. Warm beige or off-white paper background with light paper grain texture. Muted brown and sepia tone palette with one gentle accent color (e.g., blue or teal tie or accessory). Lighting soft and even, no harsh contrast or shine. Mid-20th-century magazine illustration feel, timeless and calm mood. Not photorealistic, not cartoonish — balanced in between. No modern objects, no glossy digital effects, no HDR, no text or UI elements."
  s3-path: character-images
